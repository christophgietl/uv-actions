name: Set up uv and pre-commit for Copilot
description: >
  Sets up uv and pre-commit with the exact configuration required by
  copilot-setup-steps.yml workflows.
  Installs and caches dependencies, sets up pre-commit environments, and
  installs the git hooks for pre-commit.
runs:
  using: composite
  steps:
    - uses: christophgietl/uv-actions/set-up-uv@c84085700a4d21a4b7c3ea35704aaa6454ebc72f # 2026.7.13
      with:
        install-and-cache-dependencies: true
    - uses: christophgietl/uv-actions/set-up-pre-commit@c84085700a4d21a4b7c3ea35704aaa6454ebc72f # 2026.7.13
      with:
        cache-key-suffix: copilot-setup-steps
        install-git-hooks: true
