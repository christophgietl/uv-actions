name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - set-up-pre-commit/action.yml
      - set-up-uv/action.yml
      - set-up-uv-and-pre-commit-for-copilot/action.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - set-up-pre-commit/action.yml
      - set-up-uv/action.yml
      - set-up-uv-and-pre-commit-for-copilot/action.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # We are intentionally eating our own dog food here:
      - uses: ./set-up-uv-and-pre-commit-for-copilot
