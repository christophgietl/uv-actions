name: Copilot setup steps

on:
  # Automatically trigger the workflow on modification for testing purposes:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - set-up-pre-commit/action.yml
      - set-up-uv/action.yml
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - set-up-pre-commit/action.yml
      - set-up-uv/action.yml
  workflow_dispatch:

permissions: { }

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./set-up-uv
        with:
          install-and-cache-dependencies: true
      - uses: ./set-up-pre-commit
        with:
          cache-key-suffix: copilot-setup-steps
          install-git-hooks: true
