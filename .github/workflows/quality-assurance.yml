name: QA

on:
  - push

permissions: { }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # We are intentionally eating our own dog food here:
      - uses: ./set-up-uv
        with:
          install-and-cache-dependencies: true
      - uses: ./set-up-pre-commit
        with:
          cache-key-suffix: lint
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
